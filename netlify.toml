# Netlify Configuration File
# This file automatically tells Netlify how to build the React + Vite frontend in the "frontend" subdirectory.

[build]
  base = "frontend"
  publish = "dist"
  command = "npm run build"

[build.environment]
  VITE_API_BASE_URL = "https://ai-document-intelligence-419n.onrender.com"
  VITE_API_URL = "https://ai-document-intelligence-419n.onrender.com"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
